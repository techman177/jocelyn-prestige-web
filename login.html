<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso VIP | Jocelyn Prestige</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --emerald: #50C878; --black: #000000; }
        body {
            background: radial-gradient(circle at 50% 0%, #111 0%, #000 70%);
            color: white; font-family: 'Poppins', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        .syncopate-font { font-family: 'Syncopate', sans-serif; letter-spacing: 2px; }
        .emerald-text { color: var(--emerald); text-shadow: 0 0 20px rgba(80, 200, 120, 0.3); }
        
        .login-card {
            background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px;
            padding: 50px 40px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }
        
        .form-control {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; border-radius: 50px; padding: 15px 25px; text-align: center; letter-spacing: 2px;
        }
        .form-control:focus { background: rgba(0, 0, 0, 0.6); color: white; border-color: var(--emerald); box-shadow: 0 0 15px rgba(80, 200, 120, 0.2); outline: none;}
        
        .btn-access {
            background: var(--emerald); color: #000; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; border-radius: 50px; padding: 15px 30px; border: none; transition: 0.3s; width: 100%;
        }
        .btn-access:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="mb-4">
            <i class="fas fa-lock text-white-50 fs-2 mb-3"></i>
            <h2 class="syncopate-font text-white fw-bold h5 mb-1">ACCESO <span class="emerald-text">VIP</span></h2>
            <p class="text-white-50 small fw-light">IntegratCore Secure Gateway</p>
        </div>
        
        <form onsubmit="return false;">
            <div class="mb-4">
                <input type="password" id="passphrase" class="form-control" placeholder="Código de Acceso" required>
            </div>
            <button type="submit" onclick="validateAccess()" class="btn btn-access"><i class="fas fa-sign-in-alt me-2"></i> Entrar al Panel</button>
        </form>

        <div class="mt-4 pt-4 border-top border-secondary">
            <p class="small text-white-50 mb-1">¿Olvidaste tu clave o necesitas ayuda técnica?</p>
            <a href="mailto:contact@integratcore.com" class="emerald-text text-decoration-none small fw-bold">
                <i class="fas fa-headset me-1"></i> Soporte: contact@integratcore.com
            </a>
        </div>
    </div>

    <script>
        function validateAccess() {
            const pass = document.getElementById('passphrase').value;
            // Clave configurada: Jocelyn2026
            if(pass === "Jocelyn2026") {
                window.location.href = "admin.html"; 
            } else {
                alert("Código de acceso incorrecto. Intente de nuevo.");
                document.getElementById('passphrase').value = "";
            }
        }
    </script>
</body>
</html>
