<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Prestige | IntegratCore</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #50C878; --black: #000000; --deep: #050505; }
        body {
            background-color: var(--black); color: white;
            font-family: 'Poppins', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased; margin: 0;
        }
        .syncopate-font { font-family: 'Syncopate', sans-serif; letter-spacing: 2px; }
        .emerald-text { color: var(--emerald); }
        .login-card {
            background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px; padding: 50px; width: 420px;
            box-shadow: 0 15px 50px rgba(80, 200, 120, 0.05);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            color: white; border-radius: 50px; padding: 15px 25px;
        }
        .form-control:focus { background: rgba(255, 255, 255, 0.05); color: white; border-color: var(--emerald); box-shadow: none; }
        .btn-access {
            background: var(--emerald); color: #000; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; border-radius: 50px; padding: 15px 30px; border: none; transition: 0.3s;
        }
        .btn-access:hover { background: #fff; color: #000; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h2 class="syncopate-font text-white fw-bold h4 mb-2">ADMIN</h2>
        <h1 class="syncopate-font emerald-text fw-bold h2 mb-5">PRESTIGE</h1>
        
        <p class="text-white-50 small mb-4 fw-light">IntegratCore Secure Access</p>
        
        <form onsubmit="return false;">
            <div class="mb-4">
                <input type="password" id="passphrase" class="form-control text-center" placeholder="Código de Acceso" required>
            </div>
            <button type="submit" onclick="validatePrestigeAccess()" class="btn btn-access w-100">ENTRAR</button>
        </form>
        
        <p class="text-secondary small mt-5 pt-3">Exclusivo para Jocelyn Prestige | IntegratCore © 2026</p>
    </div>

    <script>
        function validatePrestigeAccess() {
            const pass = document.getElementById('passphrase').value;
            // Código Temporal para la Fase 1
            if(pass === "Jocelyn2026") {
                window.location.href = "admin.html";
            } else {
                alert("Código de acceso incorrecto. Por favor, intente de nuevo.");
                document.getElementById('passphrase').value = "";
            }
        }
    </script>
</body>
</html>
