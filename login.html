<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Login | Busco Tu Renta by Jocelyn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            background: #ffffff;
        }
        .login-btn {
            background-color: #000;
            color: #fff;
            border-radius: 8px;
            padding: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .login-btn:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="login-card text-center mx-3">
        <h3 class="fw-bold mb-4">IntegratCore <span class="text-primary">Admin</span></h3>
        <p class="text-muted mb-4">Ingresa tu contraseña para acceder al panel.</p>
        
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label for="password" class="form-label fw-bold">Contraseña</label>
                <input type="password" class="form-control" id="password" required placeholder="Ingresa tu contraseña">
                <div id="errorMsg" class="text-danger mt-2" style="display: none; font-size: 0.9em;">Contraseña incorrecta. Inténtalo de nuevo.</div>
            </div>
            <button type="submit" class="btn login-btn w-100">Ingresar</button>
        </form>
    </div>

    <script>
        // Si ya hay sesión iniciada, enviar directo al admin
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.replace('admin.html');
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            if (pass === 'Jocelyn2026') {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.replace('admin.html');
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                // Limpiar contraseña
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>

</body>
</html>
