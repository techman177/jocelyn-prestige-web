<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin VIP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --emerald: #50C878; --black: #000000; --deep: #050505; --white: #ffffff; }
        body { background: radial-gradient(circle at 50% 0%, #111 0%, #000 70%); color: white; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0; }
        .syncopate-font { font-family: 'Syncopate', sans-serif; letter-spacing: 1px; }
        .emerald-text { color: var(--emerald); text-shadow: 0 0 20px rgba(80, 200, 120, 0.3); }
        
        .login-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(80, 200, 120, 0.2); border-radius: 24px; padding: 50px 40px; width: 100%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; z-index: 10; margin: 20px; }
        
        .form-control { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; padding: 15px 20px; font-weight: 300; transition: all 0.3s ease; }
        .form-control:focus { background: rgba(0, 0, 0, 0.7); color: white; border-color: var(--emerald); box-shadow: 0 0 10px rgba(80, 200, 120, 0.2); outline: none; }
        .input-group-text { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--emerald); border-radius: 12px; }
        
        .btn-main { background: var(--emerald); color: #000; font-weight: 600; border-radius: 12px; padding: 15px; border: none; transition: 0.3s; text-transform: uppercase; font-size: 0.95rem; width: 100%; letter-spacing: 1px; }
        .btn-main:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(80, 200, 120, 0.3); }
        
        .bg-glow { position: absolute; width: 400px; height: 400px; background: var(--emerald); filter: blur(150px); opacity: 0.15; border-radius: 50%; top: -100px; left: -100px; z-index: 0; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-card text-center">
        <h2 class="syncopate-font mb-2">ADMIN <span class="emerald-text">VIP</span></h2>
        <p class="text-white-50 mb-4 fw-light">Acceso exclusivo al sistema VIP</p>
        
        <form id="loginForm" onsubmit="return false;">
            <div class="input-group mb-4">
                <span class="input-group-text border-end-0"><i class="fas fa-user"></i></span>
                <input type="text" id="username" class="form-control border-start-0" placeholder="Usuario (Ej: admin)" required>
            </div>
            
            <div class="input-group mb-5">
                <span class="input-group-text border-end-0"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control border-start-0" placeholder="Contraseña (Ej: admin123)" required>
            </div>
            
            <button type="submit" class="btn-main" onclick="handleLogin()">INGRESAR AL PANEL</button>
            <p id="errorMsg" class="text-danger mt-3 small" style="display: none;">Credenciales incorrectas.</p>
        </form>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if ((user === 'admin' && pass === 'jocelyn2026') || (user === 'jocelyn' && pass === 'jocelyn2026')) {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.replace('admin.html');
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
